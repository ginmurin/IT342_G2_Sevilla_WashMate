spring.application.name=washmate

# ── Supabase / PostgreSQL ──────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT — issuer-uri auto-discovers the JWKS endpoint via OpenID Connect discovery
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://hjjcgurxearnkniuxnqd.supabase.co/auth/v1
